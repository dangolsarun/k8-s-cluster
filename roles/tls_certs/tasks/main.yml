---
- name: Ensure certificate staging directory exists
  ansible.builtin.file:
    path: /tmp/tls_certs
    state: directory

- name: Check if TLS certificates were provided on the Ansible Controller
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/certificates/tls.crt"
  register: local_tls_cert
  delegate_to: localhost
  become: false
  run_once: true

- name: Copy provided TLS Certificate and Key
  ansible.builtin.copy:
    src: "{{ lookup('env', 'HOME') }}/certificates/{{ item }}"
    dest: "/tmp/tls_certs/{{ item }}"
    mode: '0600'
  loop:
    - tls.crt
    - tls.key
  when: local_tls_cert.stat.exists
  run_once: true

- name: Generate Self-Signed Wildcard TLS if none provided
  ansible.builtin.shell: |
    openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
      -keyout /tmp/tls_certs/tls.key \
      -out /tmp/tls_certs/tls.crt \
      -subj "/C=NP/O=DishHome/CN=*.dishhome.com.np" \
      -addext "subjectAltName=DNS:*.dishhome.com.np,DNS:*.k8s.dishhome.com.np"
  when: not local_tls_cert.stat.exists
  run_once: true

- name: Create TLS Secrets in specified namespaces
  ansible.builtin.shell: |
    # Ensure namespace exists before creating secret
    /var/lib/rancher/rke2/bin/kubectl create namespace {{ item }} --dry-run=client -o yaml | /var/lib/rancher/rke2/bin/kubectl apply -f -
    
    /var/lib/rancher/rke2/bin/kubectl create secret tls {{ tls_secret_name }} \
      --cert=/tmp/tls_certs/tls.crt \
      --key=/tmp/tls_certs/tls.key \
      -n {{ item }} \
      --dry-run=client -o yaml | /var/lib/rancher/rke2/bin/kubectl apply -f -
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
  loop: "{{ tls_namespaces }}"
  run_once: true
