---
- name: Ensure certificate staging directory exists
  ansible.builtin.file:
    path: /tmp/tls_certs
    state: directory

- name: Copy TLS Certificate and Key securely to master
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/tmp/tls_certs/{{ item }}"
    mode: '0600'
  loop:
    - tls.crt
    - tls.key
  run_once: true

- name: Create TLS Secrets in specified namespaces
  ansible.builtin.shell: |
    # Ensure namespace exists before creating secret
    /var/lib/rancher/rke2/bin/kubectl create namespace {{ item }} --dry-run=client -o yaml | /var/lib/rancher/rke2/bin/kubectl apply -f -
    
    /var/lib/rancher/rke2/bin/kubectl create secret tls {{ tls_secret_name }} \
      --cert=/tmp/tls_certs/tls.crt \
      --key=/tmp/tls_certs/tls.key \
      -n {{ item }} \
      --dry-run=client -o yaml | /var/lib/rancher/rke2/bin/kubectl apply -f -
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
  loop: "{{ tls_namespaces }}"
  run_once: true
