---
- name: Create RKE2 Config Directory
  ansible.builtin.file:
    path: /etc/rancher/rke2
    state: directory
    mode: '0755'

- name: Deploy RKE2 Agent Config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/rke2/config.yaml
    mode: '0600'
  notify: Restart RKE2 Agent

- name: Install RKE2 Agent
  ansible.builtin.shell: curl -sfL https://get.rke2.io | sh -
  args:
    creates: /usr/local/bin/rke2
  environment:
    INSTALL_RKE2_VERSION: "{{ rke2_version }}"
    INSTALL_RKE2_TYPE: "agent"
    INSTALL_RKE2_METHOD: "tar"

- name: Enable and restart RKE2 agent service
  ansible.builtin.systemd:
    name: rke2-agent
    state: restarted
    enabled: true
    daemon_reload: true

- name: Wait for agent node to be ready in Kubernetes
  ansible.builtin.shell: |
    /var/lib/rancher/rke2/bin/kubectl get nodes {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  environment:
    KUBECONFIG: /home/dictator/.kube/config
  delegate_to: "{{ groups['rke2_servers'][0] }}"
  register: node_ready
  until: node_ready.stdout == "True"
  retries: 30
  delay: 10
  ignore_errors: true

- name: Label node as worker explicitly (Workaround for RKE2 label format issue)
  ansible.builtin.shell: |
    /var/lib/rancher/rke2/bin/kubectl label node {{ inventory_hostname }} node-role.kubernetes.io/worker=true --overwrite
  environment:
    KUBECONFIG: /home/dictator/.kube/config
  delegate_to: "{{ groups['rke2_servers'][0] }}"
  when: node_ready.stdout == "True"
  ignore_errors: true

- name: Add RKE2 binaries to GLOBAL PATH
  ansible.builtin.copy:
    dest: /etc/profile.d/rke2.sh
    content: 'export PATH=$PATH:/var/lib/rancher/rke2/bin'
    mode: '0644'
