---
- name: Deploy Internal Ingress Config Override
  ansible.builtin.template:
    src: internal-config.yaml.j2
    dest: /var/lib/rancher/rke2/server/manifests/rke2-ingress-nginx-config.yaml
    mode: '0644'

- name: Deploy External Ingress Manifest
  ansible.builtin.template:
    src: external-chart.yaml.j2
    dest: /var/lib/rancher/rke2/server/manifests/rke2-ingress-nginx-external.yaml
    mode: '0644'

- name: Ensure External Ingress Namespace exists
  ansible.builtin.shell: |
    /var/lib/rancher/rke2/bin/kubectl create namespace ingress-external \
      --dry-run=client -o yaml | /var/lib/rancher/rke2/bin/kubectl apply -f -
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
  run_once: true

- name: Purge stale external ingress resources from kube-system
  ansible.builtin.shell: |
    /var/lib/rancher/rke2/bin/kubectl delete ingressclass nginx-external --ignore-not-found
    /var/lib/rancher/rke2/bin/kubectl delete daemonset -n kube-system rke2-ingress-nginx-external-controller --ignore-not-found
    /var/lib/rancher/rke2/bin/kubectl delete service -n kube-system rke2-ingress-nginx-external-controller-admission --ignore-not-found
    /var/lib/rancher/rke2/bin/kubectl delete serviceaccount -n kube-system rke2-ingress-nginx-external --ignore-not-found
    /var/lib/rancher/rke2/bin/kubectl delete clusterrolebinding helm-kube-system-rke2-ingress-nginx-external --ignore-not-found
    /var/lib/rancher/rke2/bin/kubectl delete helmchart -n kube-system rke2-ingress-nginx-external --ignore-not-found
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
  run_once: true
  ignore_errors: true

- name: Brief pause for RKE2 reconciliation
  ansible.builtin.pause:
    seconds: 60

- name: Wait for Internal Ingress to stabilize
  ansible.builtin.shell: |
    /var/lib/rancher/rke2/bin/kubectl wait --namespace kube-system \
      --for=condition=ready pod \
      --selector=app.kubernetes.io/instance=rke2-ingress-nginx \
      --timeout=240s
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
  run_once: true

- name: Wait for External Ingress to stabilize
  ansible.builtin.shell: |
    /var/lib/rancher/rke2/bin/kubectl wait --namespace ingress-external \
      --for=condition=ready pod \
      --selector=app.kubernetes.io/instance=rke2-ingress-nginx-external \
      --timeout=240s
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
  run_once: true
