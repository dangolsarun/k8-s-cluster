---
- name: Add Prometheus Community Repo
  ansible.builtin.shell: |
    helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
    helm repo update
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
    PATH: "/usr/local/bin:{{ ansible_env.PATH }}"
  run_once: true

- name: Add Grafana Repo
  ansible.builtin.shell: |
    helm repo add grafana https://grafana.github.io/helm-charts
    helm repo update
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
    PATH: "/usr/local/bin:{{ ansible_env.PATH }}"
  run_once: true

- name: Create Monitoring Namespace and apply PodSecurity labels
  ansible.builtin.shell: |
    /var/lib/rancher/rke2/bin/kubectl create namespace monitoring --dry-run=client -o yaml | /var/lib/rancher/rke2/bin/kubectl apply -f -
    /var/lib/rancher/rke2/bin/kubectl label --overwrite ns monitoring pod-security.kubernetes.io/enforce=privileged
    /var/lib/rancher/rke2/bin/kubectl label --overwrite ns monitoring pod-security.kubernetes.io/audit=privileged
    /var/lib/rancher/rke2/bin/kubectl label --overwrite ns monitoring pod-security.kubernetes.io/warn=privileged
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
  run_once: true

- name: Copy TLS Secret to Monitoring Namespace
  ansible.builtin.shell: |
    /var/lib/rancher/rke2/bin/kubectl get secret {{ tls_secret_name }} -n kube-system -o yaml | \
      sed 's/namespace: kube-system/namespace: monitoring/' | \
      /var/lib/rancher/rke2/bin/kubectl apply -f -
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
  run_once: true

- name: Ensure temp directory exists for monitoring configs
  ansible.builtin.file:
    path: /tmp/monitoring
    state: directory
    mode: '0755'
  run_once: true

- name: Create Prometheus Values File
  ansible.builtin.template:
    src: prometheus-values.yaml.j2
    dest: /tmp/monitoring/prometheus-values.yaml
    mode: '0644'
  run_once: true

- name: Deploy Kube-Prometheus-Stack (Metrics)
  ansible.builtin.shell: |
    helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
      --namespace monitoring \
      --version 58.2.2 \
      -f /tmp/monitoring/prometheus-values.yaml \
      --wait \
      --timeout 600s
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
    PATH: "/usr/local/bin:{{ ansible_env.PATH }}"
  run_once: true

- name: Deploy Loki-Stack (Logging)
  ansible.builtin.shell: |
    helm upgrade --install loki grafana/loki-stack \
      --namespace monitoring \
      --set promtail.enabled=true \
      --set loki.persistence.enabled=true \
      --set loki.persistence.storageClassName=ceph-block \
      --set loki.persistence.size=10Gi \
      --wait \
      --timeout 600s
  environment:
    KUBECONFIG: /etc/rancher/rke2/rke2.yaml
    PATH: "/usr/local/bin:{{ ansible_env.PATH }}"
  run_once: true
